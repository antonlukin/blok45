apiVersion: batch/v1
kind: CronJob
metadata:
  name: blok45-wp-cron
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never

          volumes:
            - name: wp
              emptyDir: {}

          initContainers:
            - name: wp-seed
              image: ghcr.io/antonlukin/blok45:latest
              imagePullPolicy: Always
              command: ["sh", "-lc"]
              args:
                - |
                  set -e
                  cp -a /usr/src/wordpress/. /work/
              volumeMounts:
                - name: wp
                  mountPath: /work

          containers:
            - name: wp-cli
              image: wordpress:cli-php8.4
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: false
              envFrom:
                - secretRef:
                    name: blok45-db
                - secretRef:
                    name: blok45-wp-secrets
              volumeMounts:
                - name: wp
                  mountPath: /var/www/html
              command: ["sh", "-lc"]
              args:
                - |
                  set -euo pipefail
                  cd /var/www/html
                  cp wp-config-docker.php wp-config.php
                  wp --allow-root cron event run --due-now

